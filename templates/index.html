<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sudoku</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #fff;
      color: #222;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 28px;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
    }

    /* ── grid ─────────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(9, 48px);
      grid-template-rows:    repeat(9, 48px);
      border-top:  2px solid #555;
      border-left: 2px solid #555;
    }

    #grid input {
      width: 48px;
      height: 48px;
      border: none;
      border-right:  1px solid #ccc;
      border-bottom: 1px solid #ccc;
      text-align: center;
      font-size: 1.25rem;
      font-family: inherit;
      color: #222;
      background: #fff;
      outline: none;
      -moz-appearance: textfield;
      appearance: textfield;
      cursor: text;
      transition: background 0.15s;
    }
    #grid input::-webkit-outer-spin-button,
    #grid input::-webkit-inner-spin-button { -webkit-appearance: none; }

    /* thick borders at box boundaries (right/bottom of col 3,6 and row 3,6) */
    #grid input:nth-child(9n+3),
    #grid input:nth-child(9n+6) { border-right: 2px solid #555; }

    #grid input:nth-child(n+19):nth-child(-n+27),
    #grid input:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid #555; }

    /* right and bottom outer border */
    #grid input:nth-child(9n)   { border-right:  2px solid #555; }
    #grid input:nth-child(n+73) { border-bottom: 2px solid #555; }

    /* cell states */
    #grid input.given {
      background: #f5f5f5;
      font-weight: 700;
      pointer-events: none;
      color: #111;
    }
    #grid input.solved { background: #edf7ee; color: #2e7d32; }
    #grid input.stuck  { background: #fdf1f0; color: #c62828; }

    #grid input:focus:not(.given) { background: #f0f4ff; }

    /* ── buttons ──────────────────────────────────────────── */
    #controls {
      display: flex;
      gap: 24px;
    }

    button {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      cursor: pointer;
      padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    button:hover { color: #111; border-bottom-color: #111; }

    /* ── image upload ────────────────────────────────────── */
    #upload-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #upload-label {
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #555;
      cursor: pointer;
      padding: 4px 0;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    #upload-label:hover { color: #111; border-bottom-color: #111; }

    #upload-input { display: none; }

    #preview {
      max-width: 160px;
      max-height: 160px;
      object-fit: contain;
      display: none;
      border: 1px solid #ddd;
    }

    #msg {
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      color: #aaa;
      min-height: 1em;
    }
    #msg.ok  { color: #2e7d32; }
    #msg.err { color: #c62828; }
  </style>
</head>
<body>

  <h1>Sudoku</h1>

  <div id="grid"></div>

  <div id="controls">
    <button id="btn-solve">Solve</button>
    <button id="btn-default">Default</button>
    <button id="btn-clear">Clear</button>
  </div>

  <div id="upload-area">
    <label id="upload-label" for="upload-input">Import image</label>
    <input id="upload-input" type="file" accept="image/*">
    <img id="preview" alt="puzzle preview">
  </div>

  <div id="msg"></div>

  <script>
    const DEFAULT = {{ default_puzzle | tojson }};

    const grid    = document.getElementById("grid");
    const msg     = document.getElementById("msg");
    const inputs  = [];

    // build 81 inputs
    for (let i = 0; i < 81; i++) {
      const inp = document.createElement("input");
      inp.type = "text";
      inp.maxLength = 1;
      inp.inputMode = "numeric";
      inp.addEventListener("keydown", onKey);
      inp.addEventListener("input",   onInput);
      grid.appendChild(inp);
      inputs.push(inp);
    }

    function onInput(e) {
      const v = e.target.value.replace(/[^1-9]/g, "");
      e.target.value = v.slice(-1);
      e.target.classList.remove("solved", "stuck");
      setMsg("");
    }

    function onKey(e) {
      const idx = inputs.indexOf(e.target);
      const moves = { ArrowUp: -9, ArrowDown: 9, ArrowLeft: -1, ArrowRight: 1 };
      if (moves[e.key] !== undefined) {
        e.preventDefault();
        const next = idx + moves[e.key];
        if (next >= 0 && next < 81) inputs[next].focus();
      }
    }

    function loadPuzzle(puzzle, editable = false) {
      setMsg("");
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const inp = inputs[r * 9 + c];
          const val = puzzle[r][c];
          inp.classList.remove("given", "solved", "stuck");
          inp.readOnly = false;
          if (val) {
            inp.value = val;
            if (!editable) {
              inp.classList.add("given");
              inp.readOnly = true;
            }
          } else {
            inp.value = "";
          }
        }
      }
    }

    function getMatrix() {
      return Array.from({ length: 9 }, (_, r) =>
        Array.from({ length: 9 }, (_, c) => {
          const v = parseInt(inputs[r * 9 + c].value, 10);
          return isNaN(v) ? 0 : v;
        })
      );
    }

    async function solve() {
      setMsg("");
      const puzzle = getMatrix();
      let data;
      try {
        const res = await fetch("/solve", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ puzzle }),
        });
        data = await res.json();
      } catch {
        setMsg("Server error.", "err");
        return;
      }

      const sol = data.solution;
      const orig = getMatrix();
      for (let r = 0; r < 9; r++) {
        for (let c = 0; c < 9; c++) {
          const inp = inputs[r * 9 + c];
          if (inp.classList.contains("given")) continue;
          const v = sol[r][c];
          inp.value = v || "";
          inp.classList.remove("solved", "stuck");
          if (v && !orig[r][c])      inp.classList.add("solved");
          else if (!v && !orig[r][c]) inp.classList.add("stuck");
        }
      }
      setMsg(data.solved ? "Solved." : "Could not fully solve.", data.solved ? "ok" : "err");
    }

    function clear() {
      setMsg("");
      inputs.forEach(inp => {
        inp.classList.remove("given", "solved", "stuck");
        inp.readOnly = false;
        inp.value = "";
      });
    }

    function setMsg(text, cls) {
      msg.textContent = text;
      msg.className = cls || "";
    }

    // ── image import ────────────────────────────────────────
    const uploadInput = document.getElementById("upload-input");
    const preview     = document.getElementById("preview");

    uploadInput.addEventListener("change", async () => {
      const file = uploadInput.files[0];
      if (!file) return;

      // show thumbnail
      preview.src = URL.createObjectURL(file);
      preview.style.display = "block";

      setMsg("Reading image…");
      const fd = new FormData();
      fd.append("image", file);

      let data;
      try {
        const res = await fetch("/parse-image", { method: "POST", body: fd });
        data = await res.json();
      } catch {
        setMsg("Server error.", "err");
        return;
      }

      if (data.error) { setMsg(data.error, "err"); return; }
      loadPuzzle(data.puzzle, true);
      setMsg("Puzzle loaded — tap any cell to correct it.", "ok");
    });

    document.getElementById("btn-solve").addEventListener("click", solve);
    document.getElementById("btn-default").addEventListener("click", () => loadPuzzle(DEFAULT));
    document.getElementById("btn-clear").addEventListener("click", clear);

    loadPuzzle(DEFAULT);
  </script>
</body>
</html>
